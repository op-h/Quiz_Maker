name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Firebase Config
        env:
          FB_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FB_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FB_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FB_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FB_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          cat > js/firebase-config.js << SCRIPT_END
          const FIREBASE_CONFIG = {
            apiKey: "${FB_API_KEY}",
            authDomain: "${FB_AUTH_DOMAIN}",
            projectId: "${FB_PROJECT_ID}",
            databaseURL: "${FB_DATABASE_URL}",
            storageBucket: "${FB_STORAGE_BUCKET}",
            messagingSenderId: "${FB_MESSAGING_SENDER_ID}",
            appId: "${FB_APP_ID}"
          };
          if (typeof firebase !== 'undefined' && firebase.apps.length === 0) {
            try { firebase.initializeApp(FIREBASE_CONFIG); }
            catch (e) { console.error("Firebase init error:", e); }
          }
          SCRIPT_END

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
